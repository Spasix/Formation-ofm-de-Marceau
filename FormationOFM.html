      {
        title: "C'est quoi l'OFM ?",
        content: `L'OFM (OnlyFans Management) consiste à gérer les comptes OnlyFans de créateurs de contenu en échange d'une commission sur leurs revenus.

En tant que manager, tu prends en charge tout ce que le modèle ne veut pas ou ne sait pas faire :
• La stratégie marketing
• La réponse aux abonnés (chatting)
• La promotion sur les réseaux sociaux
• L'optimisation des prix et des offres
• Les statistiques et l'analyse des performances

Le modèle, lui, se concentre uniquement sur la création de contenu (photos/vidéos).`,

      {
        title: "Comment tu gagnes de l'argent ?",
        content: `Il existe deux modèles économiques principaux :

📌 Commission sur les revenus (le plus courant)
Tu prends entre 15% et 40% des revenus mensuels du modèle.
Exemple : Un modèle génère 5 000€/mois → tu touches 1 000€ (à 20%).

📌 Forfait mensuel
Tu factures un montant fixe chaque mois (entre 500€ et 2 000€).
Ce modèle est plus rare et réservé aux managers expérimentés.

🔑 Conseil : Démarre à 20-25% avec tes premiers modèles. N'aie pas peur de baisser légèrement au départ pour construire ton portfolio.`,

        content: `Avant de te lancer, comprends bien le marché :

• Le marché est en croissance constante

  {
    id: 2, emoji: "⚖️", title: "Se lancer légalement", subtitle: "Structure ton activité", color: "#0891B2",

      {
        title: "Quel statut juridique choisir ?",
        content: `Avant de signer un seul contrat, il faut être en règle. En France, tu as 2 options principales :

📋 Auto-entrepreneur (Micro-entreprise)
• Simple à créer (quelques minutes sur autoentrepreneur.urssaf.fr)
• Pas de TVA jusqu'à 36 800€ de CA
• Charges sociales : ~22% du chiffre d'affaires
• Idéal pour débuter

🏢 SASU / SAS
• Plus de protection personnelle
• Optimisation fiscale possible
• Conseillé à partir de 3 000-4 000€/mois de revenus
• Nécessite un comptable

👉 Commence en auto-entrepreneur. Simple, rapide, et tu peux toujours évoluer.`,
        tip: "💡 Déclare ton activité sous le code APE 7490B (Autres activités professionnelles) ou 6399Z (Portails internet)."

      {
        title: "Le contrat avec le modèle",
        content: `Un contrat est INDISPENSABLE pour travailler avec un modèle. Il protège les deux parties.

📄 Ce que le contrat doit inclure :

1. Identité des deux parties
2. Durée du contrat (recommandé : 3 mois renouvelables)
3. Pourcentage de commission (ex: 25%)
4. Modalités de paiement (quand, comment)
5. Droits d'accès au compte (qui gère quoi)
6. Clause de confidentialité
7. Conditions de rupture du contrat
8. Responsabilités de chaque partie

⚠️ Points importants :
• Ne jamais travailler sans contrat signé
• Préciser clairement qui détient les accès au compte
• Inclure une clause anti-concurrence (le modèle ne peut pas changer d'agence pendant X mois)
• Fais relire par un juriste si le modèle génère plus de 2 000€/mois`,

• Utilise un tableur ou un logiciel (Tiime, Freebe) pour suivre tes revenus
• Facture toujours le modèle avec une vraie facture (numéro, date, montant HT, TVA si applicable)

📊 Exemple de facture mensuelle :
Prestation de gestion de compte OnlyFans - Mois de juin 2026
Commission 25% sur 4 000€ de revenus = 1 000€ HT`,

🎵 TikTok

💬 Reddit / Discord

• Serveurs Discord spécialisés dans le contenu digital

👥 Ton réseau personnel
• Le moyen le plus simple pour débuter
• Quelqu'un que tu connais qui voudrait se lancer`,

        title: "Comment approcher un modèle ?",
        content: `L'approche est cruciale. La plupart des managers débutants font les mêmes erreurs.

❌ Ce qu'il ne faut PAS faire :
• Envoyer un DM générique "Je suis manager, intéressé ?"
• Parler d'argent dès le premier message
• Être trop insistant

✅ Ce qui fonctionne :

Message d'approche en 3 étapes :

1️⃣ Créer le lien (message 1)
"Salut [prénom], j'aime vraiment ton contenu sur [sujet précis]. Ton [post/reel/vidéo] sur X m'a vraiment parlé."

2️⃣ Montrer la valeur (message 2)
"Je travaille dans le management de créateurs de contenu. J'ai remarqué que tu pourrais maximiser tes revenus avec une vraie stratégie. Je ne vends rien, je voulais juste partager quelques idées si ça t'intéresse."

3️⃣ La proposition (message 3, si intérêt)
"On pourrait faire un appel de 20 min ? Je te montre concrètement ce que je pourrais faire pour ton compte."`,

📞 Structure d'un appel réussi (20-30 minutes)

⏱️ Minutes 0-5 : Rapport & écoute
→ Qui est le modèle ? Qu'est-ce qui lui plaît dans le contenu ? Quels sont ses objectifs ?

⏱️ Minutes 5-15 : Diagnostic
→ Analyse de son compte actuel (si OF) ou de son audience (si pas encore sur OF)
→ Identifie 2-3 problèmes concrets : manque de stratégie, pas de promotion, prix mal calibrés...

⏱️ Minutes 15-25 : La proposition
→ Montre exactement ce que TU vas faire
→ Donne un exemple concret de résultat possible : "Avec une audience de 8K Instagram engagée, on peut viser 1 500-2 500€/mois les 3 premiers mois"

⏱️ Minutes 25-30 : Les conditions
→ Présente le contrat simplement
→ Réponds aux questions
→ Fixe une date pour signer

🎯 Objectif : Que le modèle signe dans les 48h suivant l'appel.`,

    lessons: [
      {
        title: "C'est quoi le chatting ?",
        content: `Le chatting représente 60-80% des revenus d'un compte OnlyFans. C'est l'art de communiquer avec les abonnés pour les engager et les inciter à acheter.

En tant que manager, tu gères les conversations à la place du modèle (avec son accord, bien sûr).

💰 Les sources de revenus via le chatting :
• Les abonnements (revenus fixes)
• Les PPV (Pay Per View) : contenu exclusif envoyé en DM contre paiement
• Les tips (pourboires) : abonnés qui envoient de l'argent spontanément
• Les demandes personnalisées : contenu fait sur mesure (très bien payé)
• Les packs : vendre des archives de contenu en lot

🎯 Ton objectif en tant que chatteur :
Construire une vraie relation avec chaque abonné pour qu'il dépense plus et reste plus longtemps abonné.`,
        tip: "💡 Le meilleur chatteur n'est pas celui qui vend le plus agressivement, mais celui qui crée le lien le plus authentique."

        title: "Techniques de chatting efficaces",
        content: `Voici les techniques qui fonctionnent le mieux pour maximiser les revenus :

🔥 La personalisation
• Retiens le prénom et des détails sur chaque abonné
• Réfère-toi à des conversations précédentes : "Tu m'avais dit que tu aimais..."
• Chaque message doit sembler unique, jamais copié-collé

💎 La technique du PPV
1. Crée du désir sans tout montrer
2. Envoie un message teaser : "J'ai filmé quelque chose de spécial ce matin, je te l'envoie ?"
3. Fixe un prix adapté (5-20€ pour un PPV standard)

🎁 Les tips
• Remercie chaleureusement chaque tip, même petit
• Crée des occasions spéciales : "C'est mon anniversaire cette semaine 🎂"
• Propose des "objectifs" : "Si j'atteins 500€ de tips ce mois, je poste [contenu spécial]"

⏰ Les horaires
• Les meilleurs moments : 20h-23h en semaine, 11h-14h le week-end
• Réponds dans les 30 minutes sur ces créneaux`,

        content: `Quand tu gères plusieurs modèles, tu ne peux pas chatter seul. Tu dois déléguer.

👥 Comment recruter un chatteur :
• Plateformes : LinkedIn, groupes Facebook OFM, Discord spécialisés
• Profil idéal : à l'aise à l'écrit, empathique, disponible le soir
• Attention : ils auront accès aux comptes. Confiance = essentielle

💼 La rémunération d'un chatteur :
• Option 1 : Pourcentage (8-15% des revenus du compte géré)
• Option 2 : Salaire fixe + bonus sur performance
• Fais signer un contrat de confidentialité OBLIGATOIREMENT

📋 Les outils pour gérer une équipe :
• INFLOW ou OFFMY : logiciels de gestion OFM
• Notion ou Trello : pour les procédures et les scripts
• Telegram ou Discord privé : communication interne

📊 Comment former ton chatteur :
1. Crée un guide de marque (ton, vocabulaire à utiliser, sujets interdits)
2. Fournis des scripts pour les situations récurrentes
3. Fais un suivi hebdomadaire des performances`,

        content: `OnlyFans ne génère aucun trafic organique. TOUT doit venir de l'extérieur. C'est là que ton rôle est crucial.

📱 Les plateformes par ordre d'efficacité :

🥇 TikTok (meilleur ROI)
• Contenus courts (15-60s), tendances, transitions
• Pas de nudité mais contenu suggestif/lifestyle autorisé
• Algorithme qui push les nouveaux créateurs = opportunité

🥈 Instagram

• Collaboration avec d'autres créateurs (collab posts)
• Bio optimisée avec lien Linktree vers OF

🥉 Twitter/X
• Le seul réseau qui autorise du contenu explicite
• Très bonne communauté OF
• Permet de convertir directement

🎯 Stratégie de contenu :
• 1 TikTok par jour minimum

• 1 Reel Instagram par semaine

📸 Photo de profil

• Attirante mais pas vulgaire (pour attirer les bons abonnés)

📝 Bio (150-200 caractères max)

📦 Le contenu d'accueil

• Propose immédiatement un PPV "bienvenue" à prix réduit

        tip: "💡 Un profil qui convertit à 5-10% (sur 100 visiteurs, 5-10 s'abonnent) est un bon résultat. Optimise jusqu'à atteindre ce taux."

const totalLessons = modules.reduce((a, m) => a + m.lessons.length, 0);
let completed = {};
let curModule = 0;
let curLesson = 0;

function getLineColor(line, color) {
  if (line.startsWith("•") || line.startsWith("→")) return "#C4B5FD";
  if (line.includes("❌") || line.includes("⚠️") || line.includes("🚫")) return "#FCA5A5";
  if (line.includes("✅") || line.includes("✓")) return "#86EFAC";
  if (line.includes("📌") || line.includes("🥇") || line.includes("🥈") || line.includes("🥉")) return "#FDE68A";
  return "#D1D5DB";
}

function updateProgress() {
  const count = Object.keys(completed).length;
  const pct = Math.round((count / totalLessons) * 100);
  document.getElementById("lbl-count").textContent = `${count}/${totalLessons} leçons`;
  document.getElementById("lbl-pct").textContent = `${pct}%`;
  document.getElementById("progress-bar").style.width = pct + "%";
  document.getElementById("stat-done").textContent = count;
}

function renderModuleCards() {
  const container = document.getElementById("module-cards");
  container.innerHTML = "";
  modules.forEach((mod, idx) => {
    const done = mod.lessons.filter((_, i) => completed[`${mod.id}-${i}`]).length;
    const fullDone = done === mod.lessons.length;
    const pct = Math.round((done / mod.lessons.length) * 100);

    const card = document.createElement("div");
    card.className = "module-card" + (fullDone ? " done" : "");
    card.onclick = () => openModule(idx);
    card.innerHTML = `
      <div class="module-inner">
        <div class="module-icon" style="background:${mod.color}22">${mod.emoji}</div>
        <div class="module-meta">
          <div class="module-tag" style="color:${mod.color}">
            MODULE ${mod.id}
            ${fullDone ? '<span class="module-done-badge">✓ Terminé</span>' : ""}
          </div>
          <div class="module-title">${mod.title}</div>
          <div class="module-sub">${mod.subtitle} · ${mod.lessons.length} leçons</div>
        </div>
        <div class="module-count">
          <div class="module-count-val" style="color:${done > 0 ? mod.color : "#4B5563"}">${done}/${mod.lessons.length}</div>
          <div class="module-count-lbl">leçons</div>
        </div>
      </div>
      <div class="module-progress">
        <div class="module-progress-fill" style="width:${pct}%;background:${mod.color}"></div>
      </div>`;
    container.appendChild(card);
  });
}

function openModule(idx) {
  curModule = idx;
  curLesson = 0;
  document.getElementById("home-view").style.display = "none";
  document.getElementById("lesson-view").style.display = "block";
  renderLesson();
}

function goHome() {
  document.getElementById("lesson-view").style.display = "none";
  document.getElementById("home-view").style.display = "block";
  renderModuleCards();
  updateProgress();
}

function renderLesson() {
  const mod = modules[curModule];
  const lesson = mod.lessons[curLesson];
  const key = `${mod.id}-${curLesson}`;
  const isDone = !!completed[key];

  // Header
  document.getElementById("lesson-header").style.background = mod.color;
  document.getElementById("lh-module").textContent = `${mod.emoji} ${mod.title}`;
  document.getElementById("lh-title").textContent = lesson.title;

  // Nav tabs
  const nav = document.getElementById("lesson-nav");
  nav.innerHTML = "";
  mod.lessons.forEach((l, i) => {
    const k = `${mod.id}-${i}`;
    const btn = document.createElement("button");
    btn.className = "lesson-nav-btn";
    btn.textContent = (completed[k] ? "✓" : (i + 1)) + ". " + l.title.split(" ").slice(0, 2).join(" ") + "...";
    btn.style.background = curLesson === i ? mod.color : (completed[k] ? "#1e3a2e" : "#2A2A3E");
    btn.style.color = curLesson === i ? "#fff" : (completed[k] ? "#4ade80" : "#888");
    btn.onclick = () => { curLesson = i; renderLesson(); };
    nav.appendChild(btn);
  });

  // Content
  document.getElementById("lc-title").textContent = lesson.title;
  document.getElementById("lesson-body").style.borderLeftColor = mod.color;

  const body = document.getElementById("lesson-body");
  body.innerHTML = "";
  lesson.content.split("\n").forEach(line => {
    const p = document.createElement("p");
    p.textContent = line;
    if (line === "") p.className = "empty";
    p.style.color = getLineColor(line, mod.color);
    body.appendChild(p);
  });

  document.getElementById("lc-tip").textContent = lesson.tip;

  // Buttons
  const btnPrev = document.getElementById("btn-prev");
  const btnDone = document.getElementById("btn-done");
  const btnNext = document.getElementById("btn-next");
  const btnFinish = document.getElementById("btn-finish");

  btnPrev.disabled = curLesson === 0;
  btnDone.style.display = isDone ? "none" : "flex";
  btnNext.style.display = (isDone && curLesson < mod.lessons.length - 1) ? "flex" : "none";
  btnFinish.style.display = (isDone && curLesson === mod.lessons.length - 1) ? "flex" : "none";
  btnNext.style.background = `linear-gradient(135deg, ${mod.color}, ${mod.color}cc)`;
}

function markDone() {
  const mod = modules[curModule];
  const key = `${mod.id}-${curLesson}`;
  completed[key] = true;
  renderLesson();
}

function prevLesson() {
  if (curLesson > 0) { curLesson--; renderLesson(); }
}

function nextLesson() {
  const mod = modules[curModule];
  if (curLesson < mod.lessons.length - 1) { curLesson++; renderLesson(); }
}

// Init
renderModuleCards();
updateProgress();
</script>
</body>
</html>
